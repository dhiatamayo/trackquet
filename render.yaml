# Render Blueprint — defines both services declaratively
# Docs: https://render.com/docs/blueprint-spec
# Cost: $0/month — free tier (native Go runtime + static site + free Postgres)

services:
  # ── Backend (Go native — free tier) ─────────────────────────────────────────
  - type: web
    name: trackquet-backend
    runtime: go
    rootDir: backend
    buildCommand: go build -o trackquet-server .
    startCommand: ./trackquet-server
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trackquet-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://trackquet-frontend.onrender.com   # update after first deploy
      - key: PORT
        value: "8080"
    healthCheckPath: /api/racquets

  # ── Frontend (Static Site — free) ────────────────────────────────────────────
  - type: web
    name: trackquet-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && VITE_API_URL=$VITE_API_URL npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://trackquet-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: trackquet-db
    plan: free
    databaseName: trackquet
    user: trackquet
